name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e .[dev]
      - run: python -m compileall -q src
      - run: pytest -q
      - name: wheel carries the universe
        run: |
          pip install build >/dev/null && python -m build --wheel >/dev/null
          python -c "import zipfile,glob,sys; w=glob.glob('dist/*.whl')[0]; names=zipfile.ZipFile(w).namelist(); sys.exit(0 if any(n.endswith('finfacts/data/universe.csv') for n in names) else ('universe.csv missing from wheel: '+w))"

